name: Visual Regression (Percy)

on:
  pull_request:
    branches: [main]

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    name: Percy Visual Regression

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build token types
        run: npm run build:tokens
        env:
          NODE_ENV: production

      - name: Build React package
        run: npm run build:react
        env:
          NODE_ENV: production

      - name: Build Storybook
        run: npm run build-storybook
        working-directory: packages/react
        env:
          NODE_ENV: production

      - name: Run Percy visual regression tests
        run: npm run percy
        working-directory: packages/react
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}

      - name: Report Percy success
        if: success()
        run: |
          echo "✅ Visual regression tests PASSED"
          echo "✅ Percy snapshots validated"

      - name: Report Percy failure
        if: failure()
        run: |
          echo "❌ Visual regression tests FAILED"
          echo "Check Percy dashboard for diffs: https://percy.io"
          exit 1
