name: Release

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.28.1'

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$GITHUB_REF" >> $GITHUB_OUTPUT

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.version }}

          # Extract the changelog section for this version
          # Pattern: ## [VERSION] — DATE until next ## [VERSION] or end of file

          CHANGELOG_SECTION=$(awk -v ver="$VERSION" '
            /^## \['"$VERSION"'\]/ {
              found = 1
              next
            }
            /^## \[/ && found {
              exit
            }
            found && NF {
              print
            }
          ' CHANGELOG.md)

          if [ -z "$CHANGELOG_SECTION" ]; then
            echo "warning=Changelog section not found for v$VERSION" >> $GITHUB_OUTPUT
            CHANGELOG_SECTION="See CHANGELOG.md for details"
          fi

          # Save multiline content to file and then read it
          echo "$CHANGELOG_SECTION" > /tmp/changelog.txt

          # For GitHub API, we need to escape for JSON
          CHANGELOG_JSON=$(cat /tmp/changelog.txt | jq -Rs .)
          echo "content=$CHANGELOG_JSON" >> $GITHUB_OUTPUT

          # Also provide raw for workflow output
          echo "raw<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG_SECTION" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.raw }}
          draft: false
          prerelease: false

      - name: Validate release created
        run: |
          echo "✅ GitHub Release created successfully"
          echo "Release URL: ${{ steps.create_release.outputs.html_url }}"
          echo "Release ID: ${{ steps.create_release.outputs.id }}"

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: create-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify version consistency
        run: |
          VERSION=${{ steps.version.outputs.version }}

          # Check that package.json versions match the tag
          REACT_VERSION=$(jq -r '.version' packages/react/package.json)

          if [ "$REACT_VERSION" != "$VERSION" ]; then
            echo "❌ Version mismatch!"
            echo "Tag version: $VERSION"
            echo "Package version: $REACT_VERSION"
            exit 1
          fi

          echo "✅ Version consistency verified: v$VERSION"

      - name: Run validation suite
        run: npm run audit

      - name: Build release artifacts
        run: npm run build:release

      - name: Publish @orion-ds/react to npm
        run: |
          cd packages/react
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @orion-ds/cli to npm
        run: |
          cd packages/cli
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @orion-ds/mcp to npm
        run: |
          cd packages/mcp
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @orion-ds/create to npm
        run: |
          cd packages/create
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @orion-ds/validate to npm
        run: |
          cd packages/validate
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish release summary
        run: |
          echo "✅ All packages published to npm"
          echo "📦 Published version: v${{ steps.version.outputs.version }}"
          echo ""
          echo "Installation:"
          echo "  npm install @orion-ds/react@${{ steps.version.outputs.version }}"
          echo "  npm install @orion-ds/cli@${{ steps.version.outputs.version }}"
          echo "  npm install @orion-ds/mcp@${{ steps.version.outputs.version }}"

      - name: Create deployment status
        run: |
          cat > /tmp/release-summary.md << 'EOF'
          # Release v${{ steps.version.outputs.version }}

          ✅ GitHub Release created
          ✅ All packages published to npm

          ## Packages
          - @orion-ds/react@${{ steps.version.outputs.version }}
          - @orion-ds/cli@${{ steps.version.outputs.version }}
          - @orion-ds/mcp@${{ steps.version.outputs.version }}
          - @orion-ds/create@${{ steps.version.outputs.version }}
          - @orion-ds/validate@${{ steps.version.outputs.version }}

          See release page for changelog: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}
          EOF

          cat /tmp/release-summary.md
