name: Switch
title: "Switch"
description: "Toggle switch control"
category: "form"

props:
  label:
    type: "string"
    description: "Switch label text. Required for accessibility unless aria-label is provided."
    required: false
  size:
    type: "SwitchSize"
    description: "Switch size variant. @default 'sm'"
    required: false
  helperText:
    type: "string"
    description: "Helper text displayed below the switch. Automatically linked via aria-describedby."
    required: false
  error:
    type: "string"
    description: "Error message. Shows error state and displays message below switch."
    required: false

ai_rules:
  - "Never add brand prop (brand is global via ThemeProvider)"
  - "Use semantic color tokens only (var(--text-primary), var(--interactive-primary), etc)"
  - "Check data-theme context before styling (light/dark)"
  - "Support checked/unchecked states with onChange callback"
  - "Always include accessible labels (visible or aria-label)"

examples:
  - title: "Basic Usage"
    code: |
      <Switch label="Option" />
  - title: "Different Sizes"
    code: |
      <Switch label="Option" size="lg" />

tokens:
  - "--text-primary"
  - "--interactive-primary"
  - "--border-default"
  - "--spacing-4"
  - "--radius-control"
  - "--font-secondary"

related_components: ["Checkbox", "Toggle", "Button", "Field"]
