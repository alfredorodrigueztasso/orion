name: FontLoader
title: "FontLoader"
description: "Font loading utility"
category: "component"

props:
  showLoadingState:
    type: "boolean"
    description: "Whether to show loading state while fonts are loading @default false"
    required: false
  loadingComponent:
    type: "ReactNode"
    description: "Custom component to display while loading fonts Only used if `showLoadingState` is true"
    required: false
  children:
    type: "ReactNode"
    description: "Children to render after fonts are loaded"
    required: false

ai_rules:
  - "Never add brand prop (brand is global via ThemeProvider)"
  - "Use semantic color tokens only (var(--text-primary), var(--interactive-primary), etc)"
  - "Check data-theme context before styling (light/dark)"

examples:
  - title: "Basic Usage"
    code: |
      <FontLoader />
  - title: "With Props"
    code: |
      <FontLoader {...props} />

tokens:
  - "--spacing-4"
  - "--radius-control"
  - "--font-secondary"

related_components: ["Button", "Card", "Field", "Stack"]
