name: Combobox
title: "Combobox"
description: "Searchable select dropdown"
category: "interactive"

props:
  options:
    type: "ComboboxOption[]"
    description: "Available options"
    required: true
  value:
    type: "string | null"
    description: "Currently selected value"
    required: false
  size:
    type: "ComboboxSize"
    description: "Size variant @default 'md'"
    required: false
  label:
    type: "string"
    description: "Field label"
    required: false
  helperText:
    type: "string"
    description: "Helper text below the input"
    required: false
  error:
    type: "string"
    description: "Error message (also sets error state)"
    required: false
  loading:
    type: "boolean"
    description: "Whether the combobox is loading @default false"
    required: false
  clearable:
    type: "boolean"
    description: "Whether to allow clearing the selection @default true"
    required: false
  allowFreeInput:
    type: "boolean"
    description: "Whether to allow free text input (not just selection) @default false"
    required: false
  openOnFocus:
    type: "boolean"
    description: "Whether to show the dropdown when input is focused @default true"
    required: false
  minChars:
    type: "number"
    description: "Minimum characters before showing options @default 0"
    required: false
  emptyText:
    type: "string"
    description: "Text to show when no options match @default 'No results found'"
    required: false
  maxHeight:
    type: "number"
    description: "Maximum height of the dropdown @default 300"
    required: false
  fullWidth:
    type: "boolean"
    description: "Whether the input is full width @default false"
    required: false

ai_rules:
  - "Never add brand prop (brand is global via ThemeProvider)"
  - "Use semantic color tokens only (var(--text-primary), var(--interactive-primary), etc)"
  - "Check data-theme context before styling (light/dark)"
  - "Position prop controls placement (top/bottom/left/right)"
  - "Manage open/close state with isOpen prop"

examples:
  - title: "Default State"
    code: |
      <Combobox trigger="Click me">Content</Combobox>
  - title: "With Props"
    code: |
      <Combobox {...props} />

tokens:
  - "--text-primary"
  - "--interactive-primary"
  - "--border-default"
  - "--spacing-4"
  - "--radius-control"
  - "--font-secondary"

related_components: ["Button", "Card", "Icon", "Popover"]
