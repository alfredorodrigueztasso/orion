name: FilterBar
title: "FilterBar"
description: "Data filtering controls"
category: "component"

props:
  filters:
    type: "FilterDefinition[]"
    description: "Filter definitions"
    required: true
  activeFilters:
    type: "ActiveFilter[]"
    description: "Currently active filters"
    required: true
  value:
    type: "string | string[] | { start: string"
    description: "Filter change handler"
    required: true

ai_rules:
  - "Never add brand prop (brand is global via ThemeProvider)"
  - "Use semantic color tokens only (var(--text-primary), var(--interactive-primary), etc)"
  - "Check data-theme context before styling (light/dark)"

examples:
  - title: "Basic Usage"
    code: |
      <FilterBar />
  - title: "With Props"
    code: |
      <FilterBar {...props} />

tokens:
  - "--spacing-4"
  - "--radius-control"
  - "--font-secondary"

related_components: ["Button", "Card", "Field", "Stack"]
