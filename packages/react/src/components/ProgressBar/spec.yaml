name: ProgressBar
title: "ProgressBar"
description: "Progress indicator"
category: "component"

props:
  value:
    type: "number"
    description: "Progress value (0-100) Optional when indeterminate is true"
    required: false
  max:
    type: "number"
    description: "Maximum value @default 100"
    required: false
  variant:
    type: "ProgressBarVariant"
    description: "Progress bar variant (color) @default 'primary'"
    required: false
  size:
    type: "ProgressBarSize"
    description: "Progress bar size @default 'md'"
    required: false
  showLabel:
    type: "boolean"
    description: "Show percentage label @default false"
    required: false
  label:
    type: "string"
    description: "Custom label text"
    required: false
  indeterminate:
    type: "boolean"
    description: "Indeterminate/loading state @default false"
    required: false

ai_rules:
  - "Never add brand prop (brand is global via ThemeProvider)"
  - "Use semantic color tokens only (var(--text-primary), var(--interactive-primary), etc)"
  - "Check data-theme context before styling (light/dark)"

examples:
  - title: "Basic Usage"
    code: |
      <ProgressBar />
  - title: "With Props"
    code: |
      <ProgressBar {...props} />

tokens:
  - "--spacing-4"
  - "--radius-control"
  - "--font-secondary"

related_components: ["Button", "Card", "Field", "Stack"]
