name: Field
title: "Field"
description: "Form input with validation support"
category: "form"

props:
  type:
    type: "string"
    enum: ["text", "email", "password", "search", "number", "tel"]
    default: "text"
    description: "Input type"
  placeholder:
    type: "string"
    description: "Placeholder text"
  value:
    type: "string"
    description: "Input value (controlled)"
  onChange:
    type: "function"
    description: "Change handler"
  error:
    type: "string"
    description: "Error message (shows error state)"
  label:
    type: "string"
    description: "Associated label"
  icon:
    type: "ReactNode"
    description: "Icon displayed inside input (from lucide-react)"
  disabled:
    type: "boolean"
    description: "Disables the field"

ai_rules:
  - "Icon-only fields should have aria-label if no visible label"
  - "Use lucide-react icons with size={18}"
  - "Error state is semantic: presence of 'error' prop activates it"

examples:
  - title: "Basic Input"
    code: |
      <Field type="text" placeholder="Enter name" />
  - title: "With Icon"
    code: |
      import { Search } from 'lucide-react';
      <Field type="search" icon={<Search size={18} />} placeholder="Search..." />
  - title: "With Error"
    code: |
      <Field type="email" error="Invalid email" />

tokens:
  - "--surface-subtle"
  - "--border-subtle"
  - "--text-primary"
  - "--radius-control"
  - "--spacing-4"

related_components: ["Button", "Label", "Alert"]
