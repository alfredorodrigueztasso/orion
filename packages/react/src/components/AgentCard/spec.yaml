name: AgentCard
title: "AgentCard"
description: "Card for displaying AI agents"
category: "component"

props:
  id:
    type: "string"
    description: "Unique agent identifier"
    required: true
  avatar:
    type: "string | ReactNode"
    description: "Agent avatar (image URL or ReactNode icon)"
    required: true
  title:
    type: "string"
    description: "Agent title/name"
    required: true
  description:
    type: "string"
    description: "Agent description (max 2 lines with ellipsis). Space is always reserved for 2 lines even when empty, ensuring consistent card height in grids."
    required: false
  timestamp:
    type: "string"
    description: "Timestamp text (e.g., "Hace 2 horas")"
    required: false
  isMultiAgent:
    type: "boolean"
    description: "When true, shows a "Multi" badge indicating this is a multi-agent. Only multi-agents show a badge; single agents show nothing."
    required: false
  draggable:
    type: "boolean"
    description: "Enable drag & drop functionality @default false"
    required: false
  isDragging:
    type: "boolean"
    description: "Currently being dragged @internal"
    required: false
  availableFolders:
    type: "Array<Folder>"
    description: "Available folders"
    required: false

ai_rules:
  - "AgentCard displays agent information in a card format"
  - "Avatar can be string (image URL) or ReactNode (icon component)"
  - "Description is optional and truncated to 2 lines with ellipsis"
  - "Multi-agent badge only shows when isMultiAgent=true"
  - "Draggable prop enables drag & drop; isDragging tracks drag state"

examples:
  - title: "Basic Agent Card"
    code: |
      <AgentCard
        id="agent-1"
        avatar="https://example.com/avatar.jpg"
        title="AI Assistant"
        description="Helpful AI that answers questions"
      />
  - title: "Multi-Agent Card"
    code: |
      <AgentCard
        id="agent-2"
        avatar={<Users size={24} />}
        title="Team Agents"
        isMultiAgent={true}
      />
  - title: "Draggable Card"
    code: |
      <AgentCard
        id="agent-3"
        avatar="https://example.com/avatar.jpg"
        title="Mobile Agent"
        draggable={true}
        isDragging={false}
      />

tokens:
  - "--spacing-4"
  - "--radius-control"
  - "--font-secondary"

related_components: ["Button", "Card", "Field", "Stack"]
