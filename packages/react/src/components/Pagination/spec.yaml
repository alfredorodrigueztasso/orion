name: Pagination
title: "Pagination"
description: "Page navigation controls"
category: "navigation"

props:
  currentPage:
    type: "number"
    description: "Current active page (1-indexed)"
    required: true
  totalPages:
    type: "number"
    description: "Total number of pages"
    required: true
  siblingCount:
    type: "number"
    description: "Number of sibling pages to show on each side of current page @default 1"
    required: false
  showFirstLast:
    type: "boolean"
    description: "Whether to show first/last page buttons @default true"
    required: false
  showPrevNext:
    type: "boolean"
    description: "Whether to show previous/next buttons @default true"
    required: false
  size:
    type: "PaginationSize"
    description: "Size variant @default 'md'"
    required: false
  disabled:
    type: "boolean"
    description: "Whether the pagination is disabled @default false"
    required: false

ai_rules:
  - "Never add brand prop (brand is global via ThemeProvider)"
  - "Use semantic color tokens only (var(--text-primary), var(--interactive-primary), etc)"
  - "Check data-theme context before styling (light/dark)"
  - "Use semantic HTML (nav, link, list)"
  - "Support keyboard navigation (Tab, Arrow keys)"

examples:
  - title: "Basic Usage"
    code: |
      <Pagination />
  - title: "With Props"
    code: |
      <Pagination {...props} />

tokens:
  - "--text-primary"
  - "--surface-base"
  - "--surface-subtle"
  - "--spacing-4"
  - "--radius-control"
  - "--font-secondary"

related_components: ["Button", "Icon", "Link", "Avatar"]
